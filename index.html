        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2D5A3D;
            --primary-dark: #1E3D2A;
            --secondary: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #1F2937;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 24px 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .app-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header-actions { display: flex; gap: 12px; }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .search-bar {
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.7); }
        .content { padding: 16px; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Auth Styles */
        .auth-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 32px 24px;
            background: var(--card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo-icon { font-size: 64px; margin-bottom: 12px; }
        .auth-logo-text { font-size: 28px; font-weight: 800; color: var(--primary); }
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--bg);
            padding: 4px;
            border-radius: var(--radius-md);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .auth-tab.active { background: white; color: var(--primary); box-shadow: var(--shadow); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all 0.2s;
            background: var(--bg);
        }
        .form-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(45,90,61,0.1); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,90,61,0.3); }
        .btn:active { transform: translateY(0); }
        
        /* Province Tabs */
        .province-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .province-tabs::-webkit-scrollbar { display: none; }
        .province-tab {
            padding: 10px 16px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .province-tab:hover { border-color: var(--primary); color: var(--primary); }
        .province-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Cities Grid */
        .cities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .city-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .city-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        .city-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .city-icon { font-size: 48px; margin-bottom: 12px; }
        .city-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .city-province { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
        .city-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag {

            background: var(--bg);
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;

            border-radius: var(--radius-xl) var(--radius-xl) 0 0;

            animation: slideUp 0.3s;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-title { font-size: 20px; font-weight: 700; }
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

        .detail-section { margin-bottom: 24px; }
        .detail-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .detail-content { color: var(--text-secondary); line-height: 1.8; }
        .detail-list { list-style: none; }
        .detail-list li {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-list li:last-child { border-bottom: none; }
        
        /* AI Assistant */

            background: linear-gradient(135deg, var(--primary) 0%, #1a4d2e 100%);
            border-radius: var(--radius-xl);
            padding: 24px;
            margin-bottom: 20px;
            color: white;
        }
        .ai-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;

        .ai-avatar { font-size: 48px; }
        .ai-info h3 { font-size: 18px; margin-bottom: 4px; }

        .ai-input-group { display: flex; gap: 8px; }
        .ai-input {

            border-radius: var(--radius-lg);

            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);

        .post-header {

            align-items: center;
            gap: 12px;
            margin-bottom: 12px;

        .avatar {

            height: 44px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;

        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 15px; }
        .user-bio { font-size: 12px; color: var(--text-muted); }
        .post-content { color: var(--text); line-height: 1.6; margin-bottom: 12px; }
        .post-actions {

            gap: 16px;

        .nav-item {

        .nav-item.active { color: var(--primary); }
        .nav-item:hover { background: var(--bg); }
        .nav-icon { font-size: 24px; }
        
        /* Loading & Toast */
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }

        /* Empty State */

        .empty-text { font-size: 16px; }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;

        .quick-action {
            background: white;
            padding: 16px 8px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.2s;

        .quick-action-icon { font-size: 28px; margin-bottom: 8px; }
        .quick-action-text { font-size: 11px; color: var(--text-secondary); }
        
        /* Recommended Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title { font-size: 18px; font-weight: 700; }
        .section-more { color: var(--primary); font-size: 13px; cursor: pointer; }
    </style>
</head>

        async function api(url, options = {}) {
            try {
                const res = await fetch(`${API_BASE}${url}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {}),
                        ...options.headers
                    }
                });
                if (!res.ok) {
                    if (res.status === 401) {
                        logout();
                        showToast('请先登录');
                        return null;
                    }
                    throw new Error('请求失败');
                }
                return await res.json();
            } catch (err) {
                console.error('API Error:', err);
                showToast('网络请求失败');
                return null;
            }
        }

            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

                function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { showToast('请填写完整信息'); return; }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showToast('登录成功');
                init();
            } else {
                showToast('用户名或密码错误');
            }
        });
            
            if (res && res.success) {
                authToken = res.token;
                currentUser = res.user;
                localStorage.setItem('token', authToken);
                showToast('登录成功');
                init();
            }
        }
        
                function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value.trim() || '旅行者' + Math.floor(Math.random() * 1000);
            
            if (!username || !password) { showToast('请填写完整信息'); return; }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.username === username)) {
                showToast('用户名已存在');
                return;
            }
            
            const newUser = {
                id: Date.now(),
                username,
                password,
                nickname,
                avatar: '🧳',
                createdAt: new Date().toISOString()
            };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showToast('注册成功');
            init();
        });
            
            if (res && res.success) {
                authToken = res.token;
                currentUser = res.user;
                localStorage.setItem('token', authToken);
                showToast('注册成功');
                init();
            }
        }

            const content = document.getElementById('postContent').value.trim();
            if (!content) { showToast('请输入内容'); return; }
            
            const posts = JSON.parse(localStorage.getItem('posts') || '[]');
            posts.unshift({
                id: Date.now(),
                content,
                nickname: currentUser?.nickname || '旅行者',
                avatar: currentUser?.avatar || '🧳',
                createdAt: new Date().toISOString(),
                likes: 0,
                comments: []
            });
            localStorage.setItem('posts', JSON.stringify(posts));
            
            document.querySelector('.modal-overlay.show')?.remove();
            showToast('发布成功');
            loadSocialPage();
        }
        
        function toggleLike(postId) {
            const posts = JSON.parse(localStorage.getItem('posts') || '[]');
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                post.likes = (post.likes || 0) + (post.liked ? 1 : -1);
                localStorage.setItem('posts', JSON.stringify(posts));
                loadSocialPage();
            }
        }
        
        function sharePost(nickname) {
            const text = `${nickname}的旅行分享 - 山河旅图Pro`;
            if (navigator.share) {
                navigator.share({ title: '山河旅图', text });
            } else {
                navigator.clipboard.writeText(text);
                showToast('已复制到剪贴板');
            }
        }
        
        function loadProfilePage() {
            if (!currentUser) {
                showAuth('login');
                return;
            }
            
            document.getElementById('content').innerHTML = `
                <div class="page active">
                    <div class="profile-header">
                        <div class="profile-avatar">${currentUser.avatar || '🧳'}</div>
                        <div class="profile-name">${currentUser.nickname || '旅行者'}</div>
                        <div class="profile-level">Lv.${currentUser.level || 1}</div>
                    </div>
                    
                    <div style="padding:0 16px 16px;">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value">${currentUser.experience || 0}</div>
                                <div class="stat-label">经验值</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${JSON.parse(localStorage.getItem('aiPlans') || '[]').length}</div>
                                <div class="stat-label">旅行计划</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${JSON.parse(localStorage.getItem('posts') || '[]').length}</div>
                                <div class="stat-label">发布动态</div>
                            </div>
                        </div>
                        
                        <div class="section-title" style="margin:24px 0 16px;">📋 我的旅行计划</div>
                        ${loadMyPlans()}
                        
                        <button class="btn" onclick="logout()" style="margin-top:24px;background:var(--danger);">退出登录</button>
                    </div>
                </div>
            `;
        }
        
        function loadMyPlans() {
            const plans = JSON.parse(localStorage.getItem('aiPlans') || '[]');
            if (plans.length === 0) {
                return '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无旅行计划</div></div>';
            }
            
            return plans.slice(0, 5).map(p => `
                <div class="plan-card" onclick="displayPlan(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <div style="font-weight:600;">${getCityIcon(p.city)} ${p.city}</div>
                            <div style="font-size:12px;color:var(--text-muted);">${p.days}天行程 · ${formatTime(p.createdAt)}</div>
                        </div>
                        <div style="color:var(--primary);">查看 →</div>
                    </div>
                </div>
            `).join('');
        }
        
        function loadSearchPage() {
            document.getElementById('content').innerHTML = `
                <div class="page active" style="padding:16px;">
                    <input type="text" class="form-input" id="searchInput" placeholder="搜索城市、攻略..." autofocus style="margin-bottom:16px;" oninput="handleSearch(this.value)">
                    <div id="searchResults"></div>
                </div>
            `;
            document.getElementById('searchInput').focus();
        }
        
        function handleSearch(q) {
            if (!q) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            
            const results = cities.filter(c => 
                c.name.includes(q) || 
                c.province_name.includes(q) || 
                c.highlights.includes(q)
            );
            
            document.getElementById('searchResults').innerHTML = results.length > 0 ?
                `<div class="cities-grid">${results.map(c => `
                    <div class="city-card" onclick="showCityDetail(${c.id})">
                        <div class="city-icon">${getCityIcon(c.name)}</div>
                        <div class="city-name">${c.name}</div>
                        <div class="city-province">${c.province_name}</div>
                    </div>
                `).join('')}</div>` :
                '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">未找到结果</div></div>';
        }
        
        function formatTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            return date.toLocaleDateString('zh-CN');
        }
        
        init();
    </script>
</body>
</html>

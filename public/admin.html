<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山河旅图 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2D5A3D;
            --primary-dark: #1E3D2A;
            --secondary: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --text: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.8; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--bg);
            font-weight: 600;
            font-size: 14px;
        }
        tr:hover { background: #f9fafb; }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        .btn-danger:hover {
            background: #fecaca;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary);
        }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
        }
        .form-input:focus {
            border-color: var(--primary);
            outline: none;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_BASE = '';
        let currentUser = null;

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function render() {
            const app = document.getElementById('app');

            if (!currentUser) {
                app.innerHTML = '<div class="login-container">' +
                    '<div class="login-box">' +
                    '<h2>🏔️ 山河旅图管理后台</h2>' +
                    '<div class="form-group">' +
                    '<label class="form-label">管理员密钥</label>' +
                    '<input type="password" class="form-input" id="adminKey" placeholder="请输入管理员密钥">' +
                    '</div>' +
                    '<button class="btn-primary" onclick="handleLogin()">登录</button>' +
                    '</div></div>';
            } else {
                loadDashboard();
            }
        }

        async function handleLogin() {
            const key = document.getElementById('adminKey').value.trim();
            if (key !== 'admin2024') {
                showToast('密钥错误');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin2024' })
                });

                const data = await res.json();

                if (data.success && data.token) {
                    currentUser = data.user;
                    localStorage.setItem('adminToken', data.token);
                    render();
                    showToast('登录成功');
                } else {
                    showToast('登录失败');
                }
            } catch (error) {
                showToast('登录出错: ' + error.message);
            }
        }

        async function loadDashboard() {
            const app = document.getElementById('app');
            const token = localStorage.getItem('adminToken');

            if (!token) {
                app.innerHTML = '<div class="loading">请先登录</div>';
                render();
                return;
            }

            try {
                const [usersRes, statsRes] = await Promise.all([
                    fetch(API_BASE + '/api/admin/users', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    }),
                    fetch(API_BASE + '/api/stats')
                ]);

                if (usersRes.status === 401) {
                    localStorage.removeItem('adminToken');
                    app.innerHTML = '<div class="loading">登录已过期，请重新登录</div>';
                    setTimeout(() => render(), 2000);
                    return;
                }

                const users = await usersRes.json();
                const stats = await statsRes.json();

                let usersHtml = '';
                if (users.length === 0) {
                    usersHtml = '<div class="loading">暂无用户数据</div>';
                } else {
                    usersHtml = '<table><thead><tr><th>用户</th><th>等级</th><th>经验值</th><th>发帖数</th><th>注册时间</th><th>状态</th><th>操作</th></tr></thead><tbody>';
                    users.forEach(function(u) {
                        usersHtml += '<tr data-id="' + u.id + '"><td><div style="display:flex;align-items:center;gap:12px;"><div class="avatar">' + u.avatar + '</div><div><div style="font-weight:600;">' + u.nickname + '</div><div style="font-size:12px;color:var(--text-secondary);">@' + u.username + '</div></div></div></td>';
                        usersHtml += '<td><span class="badge badge-success">Lv.' + (u.level || 1) + '</span></td>';
                        usersHtml += '<td>' + (u.experience || 0) + '</td>';
                        usersHtml += '<td>' + (u.posts_count || 0) + '</td>';
                        usersHtml += '<td>' + new Date(u.created_at).toLocaleDateString() + '</td>';
                        usersHtml += '<td><span class="badge ' + (u.is_online ? 'badge-success' : 'badge-warning') + '">' + (u.is_online ? '在线' : '离线') + '</span></td>';
                        usersHtml += '<td><button class="btn btn-danger" onclick="deleteUser(\'' + u.id + '\', \'' + u.username + '\')">删除</button></td></tr>';
                    });
                    usersHtml += '</tbody></table>';
                }

                app.innerHTML = '<div class="header"><h1>🏔️ 山河旅图 管理后台</h1><p>欢迎回来，管理员</p></div>' +
                    '<div class="container">' +
                    '<div class="stats-grid">' +
                    '<div class="stat-card"><div class="stat-value">' + stats.users + '</div><div class="stat-label">总用户数</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + stats.cities + '</div><div class="stat-label">城市数量</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + stats.posts + '</div><div class="stat-label">帖子数量</div></div>' +
                    '<div class="stat-card"><div class="stat-value">' + stats.views + '</div><div class="stat-label">总浏览量</div></div>' +
                    '</div>' +
                    '<div class="section">' +
                    '<div class="section-title">👥 用户管理</div>' +
                    '<div style="margin-bottom:16px;"><input type="text" class="form-input" placeholder="搜索用户名或昵称..." id="searchInput" oninput="filterUsers()"></div>' +
                    '<div id="usersTable">' + usersHtml + '</div>' +
                    '</div></div>';
            } catch (error) {
                console.error('Error:', error);
                app.innerHTML = '<div class="loading">加载失败: ' + error.message + '<br><br><button onclick="loadDashboard()">重试</button></div>';
            }
        }

        function filterUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#usersTableBody tr');
            rows.forEach(function(row) {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        }

        async function deleteUser(id, username) {
            if (!confirm('确定要删除用户 "' + username + '" 吗？此操作不可恢复！')) {
                return;
            }

            const token = localStorage.getItem('adminToken');

            try {
                const res = await fetch(API_BASE + '/api/admin/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.ok) {
                    showToast('用户已删除');
                    document.querySelector('tr[data-id="' + id + '"]').remove();
                } else {
                    showToast('删除失败');
                }
            } catch (err) {
                showToast('网络错误');
            }
        }

        const savedAdminToken = localStorage.getItem('adminToken');
        if (savedAdminToken) {
            currentUser = { id: 'admin', username: 'admin' };
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山河旅图 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #C73E3A;
            --primary-dark: #8B2323;
            --secondary: #D4A84B;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg: #FDF8F0;
            --bg-dark: #F5E6D3;
            --text: #2C2C2C;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --card: #FFFBF5;
            --shadow: rgba(199, 62, 58, 0.1);
        }
        body {
            font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a84b' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }
        .login-box {
            background: var(--card);
            padding: 50px 40px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 2px solid var(--secondary);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
            font-size: 28px;
            letter-spacing: 3px;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { 
            display: block; 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--text);
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: var(--bg);
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(212, 168, 75, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(199, 62, 58, 0.3);
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { 
            font-size: 26px; 
            letter-spacing: 3px;
        }
        .header-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(212, 168, 75, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .header-logout {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .header-logout:hover {
            background: rgba(255,255,255,0.3);
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 30px; 
        }
        .nav-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 12px var(--shadow);
        }
        .nav-tab {
            padding: 12px 24px;
            background: transparent;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
        }
        .nav-tab:hover {
            background: var(--bg-dark);
        }
        .nav-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 16px var(--shadow);
            border: 1px solid rgba(212, 168, 75, 0.2);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
        }
        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .stat-value { 
            font-size: 36px; 
            font-weight: 700; 
            color: var(--primary); 
        }
        .stat-label { 
            font-size: 14px; 
            color: var(--text-secondary); 
            margin-top: 6px; 
        }
        .section {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 16px var(--shadow);
            border: 1px solid rgba(212, 168, 75, 0.2);
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            letter-spacing: 2px;
        }
        .search-bar {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
        }
        .search-input:focus {
            border-color: var(--secondary);
            outline: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--bg-dark);
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            letter-spacing: 1px;
        }
        tr:hover { background: var(--bg); }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-dark);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        .btn-danger:hover {
            background: #fecaca;
        }
        .btn-success {
            background: #d1fae5;
            color: #065f46;
        }
        .btn-success:hover {
            background: #a7f3d0;
        }
        .btn-secondary {
            background: var(--bg-dark);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: var(--border);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s;
            font-weight: 600;
        }
        .toast.error {
            background: var(--danger);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            font-size: 16px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .content-preview {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_BASE = '';
        let currentUser = null;
        let adminToken = null;
        let currentTab = 'dashboard';

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = isError ? 'toast error' : 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString().slice(0, 5);
        }

        function render() {
            const app = document.getElementById('app');
            adminToken = localStorage.getItem('adminToken');

            if (!adminToken) {
                renderLogin();
            } else {
                renderDashboard();
            }
        }

        function renderLogin() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h2>🏔️ 山河旅图</h2>
                        <div class="login-subtitle">管理后台登录</div>
                        <div class="form-group">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-input" id="adminUsername" placeholder="请输入管理员用户名">
                        </div>
                        <div class="form-group">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码">
                        </div>
                        <button class="btn-primary" onclick="handleLogin()">登 录</button>
                    </div>
                </div>`;
        }

        async function handleLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!username || !password) {
                showToast('请填写用户名和密码', true);
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success && data.token) {
                    currentUser = data.user;
                    adminToken = data.token;
                    localStorage.setItem('adminToken', data.token);
                    render();
                    showToast('登录成功');
                } else {
                    showToast(data.error || '登录失败', true);
                }
            } catch (error) {
                showToast('网络错误: ' + error.message, true);
            }
        }

        function handleLogout() {
            localStorage.removeItem('adminToken');
            currentUser = null;
            adminToken = null;
            render();
            showToast('已退出登录');
        }

        async function renderDashboard() {
            const app = document.getElementById('app');
            
            try {
                const statsRes = await fetch(API_BASE + '/api/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });

                if (statsRes.status === 401) {
                    localStorage.removeItem('adminToken');
                    showToast('登录已过期，请重新登录', true);
                    render();
                    return;
                }

                const stats = await statsRes.json();

                app.innerHTML = `
                    <div class="header">
                        <h1>🏔️ 山河旅图 管理后台</h1>
                        <div class="header-info">
                            <div class="header-avatar">${currentUser?.avatar || '👑'}</div>
                            <span>${currentUser?.nickname || '管理员'}</span>
                            <button class="header-logout" onclick="handleLogout()">退出登录</button>
                        </div>
                    </div>
                    <div class="container">
                        <div class="nav-tabs">
                            <button class="nav-tab ${currentTab === 'dashboard' ? 'active' : ''}" onclick="switchTab('dashboard')">📊 数据概览</button>
                            <button class="nav-tab ${currentTab === 'users' ? 'active' : ''}" onclick="switchTab('users')">👥 用户管理</button>
                            <button class="nav-tab ${currentTab === 'posts' ? 'active' : ''}" onclick="switchTab('posts')">📝 帖子管理</button>
                            <button class="nav-tab ${currentTab === 'comments' ? 'active' : ''}" onclick="switchTab('comments')">💬 评论管理</button>
                        </div>
                        <div id="tabContent"></div>
                    </div>`;

                loadTabContent(currentTab, stats);
            } catch (error) {
                app.innerHTML = `<div class="loading">加载失败: ${error.message}<br><br><button class="btn-primary" onclick="render()">重试</button></div>`;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadTabContent(tab);
        }

        async function loadTabContent(tab, stats = null) {
            const content = document.getElementById('tabContent');

            if (tab === 'dashboard') {
                if (!stats) {
                    const statsRes = await fetch(API_BASE + '/api/admin/stats', {
                        headers: { 'Authorization': 'Bearer ' + adminToken }
                    });
                    stats = await statsRes.json();
                }
                content.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">👥</div>
                            <div class="stat-value">${stats.users}</div>
                            <div class="stat-label">总用户数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📝</div>
                            <div class="stat-value">${stats.posts}</div>
                            <div class="stat-label">帖子数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💬</div>
                            <div class="stat-value">${stats.comments}</div>
                            <div class="stat-label">评论数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🏙️</div>
                            <div class="stat-value">${stats.cities}</div>
                            <div class="stat-label">城市数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">👁️</div>
                            <div class="stat-value">${stats.views}</div>
                            <div class="stat-label">总浏览量</div>
                        </div>
                    </div>`;
            } else if (tab === 'users') {
                content.innerHTML = '<div class="loading">加载用户数据...</div>';
                const usersRes = await fetch(API_BASE + '/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                const users = await usersRes.json();

                if (users.length === 0) {
                    content.innerHTML = `
                        <div class="section">
                            <div class="section-title">👥 用户管理</div>
                            <div class="empty-state">
                                <div class="empty-icon">👥</div>
                                <div>暂无用户数据</div>
                            </div>
                        </div>`;
                } else {
                    content.innerHTML = `
                        <div class="section">
                            <div class="section-title">👥 用户管理</div>
                            <div class="search-bar">
                                <input type="text" class="search-input" placeholder="搜索用户名或昵称..." id="searchUsers" oninput="filterTable('usersTable', this.value)">
                            </div>
                            <table id="usersTable">
                                <thead>
                                    <tr>
                                        <th>用户信息</th>
                                        <th>等级</th>
                                        <th>经验值</th>
                                        <th>发帖数</th>
                                        <th>注册时间</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${users.map(u => `
                                        <tr data-id="${u.id}">
                                            <td>
                                                <div style="display:flex;align-items:center;gap:12px;">
                                                    <div class="avatar">${u.avatar || '🧳'}</div>
                                                    <div>
                                                        <div style="font-weight:600;">${u.nickname || '旅行者'}</div>
                                                        <div style="font-size:12px;color:var(--text-secondary);">@${u.username}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td><span class="badge badge-info">Lv.${u.level || 1}</span></td>
                                            <td>${u.experience || 0}</td>
                                            <td>${u.posts_count || 0}</td>
                                            <td>${formatDate(u.created_at)}</td>
                                            <td><span class="badge ${u.is_online ? 'badge-success' : 'badge-warning'}">${u.is_online ? '在线' : '离线'}</span></td>
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="btn btn-danger" onclick="deleteUser('${u.id}', '${u.username}')">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>`;
                }
            } else if (tab === 'posts') {
                content.innerHTML = '<div class="loading">加载帖子数据...</div>';
                const postsRes = await fetch(API_BASE + '/api/admin/posts', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                const posts = await postsRes.json();

                if (posts.length === 0) {
                    content.innerHTML = `
                        <div class="section">
                            <div class="section-title">📝 帖子管理</div>
                            <div class="empty-state">
                                <div class="empty-icon">📝</div>
                                <div>暂无帖子数据</div>
                            </div>
                        </div>`;
                } else {
                    content.innerHTML = `
                        <div class="section">
                            <div class="section-title">📝 帖子管理</div>
                            <div class="search-bar">
                                <input type="text" class="search-input" placeholder="搜索帖子内容..." id="searchPosts" oninput="filterTable('postsTable', this.value)">
                            </div>
                            <table id="postsTable">
                                <thead>
                                    <tr>
                                        <th>作者</th>
                                        <th>内容</th>
                                        <th>城市</th>
                                        <th>点赞</th>
                                        <th>评论</th>
                                        <th>发布时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${posts.map(p => `
                                        <tr data-id="${p.id}">
                                            <td>
                                                <div style="display:flex;align-items:center;gap:12px;">
                                                    <div class="avatar">${p.avatar || '🧳'}</div>
                                                    <div>
                                                        <div style="font-weight:600;">${p.nickname || '匿名'}</div>
                                                        <div style="font-size:12px;color:var(--text-secondary);">@${p.username}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td><div class="content-preview">${p.content}</div></td>
                                            <td>${p.city_name || '-'}</td>
                                            <td>${p.likes_count || 0}</td>
                                            <td>${p.comments_count || 0}</td>
                                            <td>${formatDate(p.created_at)}</td>
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="btn btn-danger" onclick="deletePost('${p.id}')">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>`;
                }
            } else if (tab === 'comments') {
                content.innerHTML = '<div class="loading">加载评论数据...</div>';
                const commentsRes = await fetch(API_BASE + '/api/admin/comments', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                const comments = await commentsRes.json();

                if (comments.length === 0) {
                    content.innerHTML = `
                        <div class="section">
                            <div class="section-title">💬 评论管理</div>
                            <div class="empty-state">
                                <div class="empty-icon">💬</div>
                                <div>暂无评论数据</div>
                            </div>
                        </div>`;
                } else {
                    content.innerHTML = `
                        <div class="section">
                            <div class="section-title">💬 评论管理</div>
                            <div class="search-bar">
                                <input type="text" class="search-input" placeholder="搜索评论内容..." id="searchComments" oninput="filterTable('commentsTable', this.value)">
                            </div>
                            <table id="commentsTable">
                                <thead>
                                    <tr>
                                        <th>评论者</th>
                                        <th>评论内容</th>
                                        <th>所属帖子</th>
                                        <th>评论时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${comments.map(c => `
                                        <tr data-id="${c.id}">
                                            <td>
                                                <div style="display:flex;align-items:center;gap:12px;">
                                                    <div class="avatar">${c.avatar || '🧳'}</div>
                                                    <div>
                                                        <div style="font-weight:600;">${c.nickname || '匿名'}</div>
                                                        <div style="font-size:12px;color:var(--text-secondary);">@${c.username}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td><div class="content-preview">${c.content}</div></td>
                                            <td>${c.post_title || '无标题'}</td>
                                            <td>${formatDate(c.created_at)}</td>
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="btn btn-danger" onclick="deleteComment('${c.id}')">删除</button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>`;
                }
            }
        }

        function filterTable(tableId, query) {
            const table = document.getElementById(tableId);
            if (!table) return;
            
            const rows = table.querySelectorAll('tbody tr');
            const lowerQuery = query.toLowerCase();
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(lowerQuery) ? '' : 'none';
            });
        }

        async function deleteUser(id, username) {
            if (!confirm('确定要删除用户 "' + username + '" 吗？此操作不可恢复！')) {
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/admin/users/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });

                if (res.ok) {
                    showToast('用户已删除');
                    document.querySelector('tr[data-id="' + id + '"]').remove();
                } else {
                    const data = await res.json();
                    showToast(data.error || '删除失败', true);
                }
            } catch (err) {
                showToast('网络错误', true);
            }
        }

            if (!confirm('确定要删除此帖子吗？相关的评论和点赞也会被删除！')) {

            }
        }

        render();
    </script>

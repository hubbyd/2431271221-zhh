<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山河旅图 - 旅行社交平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --cinnabar: #C73E3A;
            --gold: #D4A84B;
            --gold-light: #F5E6C8;
            --ink: #2C2C2C;
            --ink-light: #4A4A4A;
            --jade: #5B8A72;
            --jade-dark: #3D6B54;
            --ivory: #FDF8F0;
            --paper: #F7F3EB;
            --paper-dark: #EDE6D6;
            --vermilion: #E85D4C;
            --shadow: rgba(44, 44, 44, 0.1);
            --shadow-lg: rgba(44, 44, 44, 0.15);
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            padding-bottom: 20px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a84b' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
        .header {
            background: linear-gradient(180deg, var(--ink) 0%, var(--ink-light) 100%);
            color: var(--gold);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 20px var(--shadow-lg);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--cinnabar);
            border-radius: 2px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 28px;
            letter-spacing: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header-actions { display: flex; gap: 12px; }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(212, 168, 75, 0.15);
            border: 1px solid rgba(212, 168, 75, 0.3);
            color: var(--gold);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .icon-btn:hover {
            background: var(--gold);
            color: var(--ink);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(212, 168, 75, 0.4);
        }
        .main-nav {
            display: flex;
            gap: 8px;
        }
        .nav-link {
            padding: 10px 20px;
            color: var(--gold-light);
            font-size: 14px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
            letter-spacing: 2px;
            text-decoration: none;
        }
        .nav-link:hover {
            background: rgba(212, 168, 75, 0.2);
            color: var(--gold);
        }
        .nav-link.active {
            background: var(--cinnabar);
            color: white;
        }
        .search-bar {
            background: rgba(253, 248, 240, 0.1);
            border: 1px solid rgba(212, 168, 75, 0.2);
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 400px;
            margin-top: 12px;
        }
        .search-bar:hover {
            background: rgba(253, 248, 240, 0.15);
            border-color: var(--gold);
        }
        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: var(--gold-light);
            font-size: 14px;
            font-family: 'Noto Serif SC', serif;
            outline: none;
        }
        .search-bar input::placeholder { color: rgba(245, 230, 200, 0.6); }
        .content { padding: 30px 0; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .chinese-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 40px 0;
            color: var(--gold);
            font-size: 14px;
        }
        .chinese-divider::before, .chinese-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            max-width: 200px;
        }
        .chinese-divider span { letter-spacing: 6px; }
        .section-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 24px;
            color: var(--ink);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 3px;
        }
        .section-title::before {
            content: '◆';
            color: var(--cinnabar);
            font-size: 12px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), transparent);
            margin-left: 16px;
            max-width: 100px;
        }
        .card {
            background: var(--ivory);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px var(--shadow);
            border: 1px solid rgba(212, 168, 75, 0.2);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--cinnabar), var(--gold), var(--cinnabar));
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow-lg);
        }
        .auth-container {
            max-width: 380px;
            margin: 30px auto;
            padding: 40px 30px;
            background: var(--ivory);
            border-radius: 16px;
            box-shadow: 0 10px 40px var(--shadow-lg);
            border: 2px solid var(--gold);
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo-icon { font-size: 56px; margin-bottom: 12px; display: block; }
        .auth-logo-text {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 28px;
            color: var(--cinnabar);
            letter-spacing: 6px;
        }
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--paper);
            padding: 4px;
            border-radius: 25px;
            border: 1px solid rgba(212, 168, 75, 0.3);
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
            color: var(--ink-light);
        }
        .auth-tab.active {
            background: var(--cinnabar);
            color: white;
            box-shadow: 0 2px 8px rgba(199, 62, 58, 0.3);
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 13px;
            color: var(--ink-light);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--paper-dark);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Noto Serif SC', serif;
            transition: all 0.3s;
            background: var(--paper);
        }
        .form-input:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(212, 168, 75, 0.15);
            background: var(--ivory);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--cinnabar) 0%, #A63030 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 4px;
            box-shadow: 0 4px 15px rgba(199, 62, 58, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(199, 62, 58, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, var(--jade) 0%, var(--jade-dark) 100%);
            box-shadow: 0 4px 15px rgba(91, 138, 114, 0.3);
        }
        .province-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .province-tabs::-webkit-scrollbar { display: none; }
        .province-tab {
            padding: 10px 20px;
            background: var(--ivory);
            border: 1px solid var(--paper-dark);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-light);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .province-tab:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
        .province-tab.active {
            background: linear-gradient(135deg, var(--cinnabar) 0%, #A63030 100%);
            color: white;
            border-color: var(--cinnabar);
            box-shadow: 0 4px 12px rgba(199, 62, 58, 0.35);
        }
        .province-tab.active:hover { transform: translateY(-2px); }
        .cities-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .city-card {
            background: var(--ivory);
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 6px 20px var(--shadow);
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            text-align: center;
        }
        .city-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cinnabar), var(--gold), var(--vermilion));
        }
        .city-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d4a84b' fill-opacity='0.03'%3E%3Cpath d='M20 20l10-10v20l-10-10z'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .city-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px var(--shadow-lg);
            border-color: var(--gold);
        }
        .city-icon {
            font-size: 52px;
            margin-bottom: 14px;
            display: block;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
            transition: transform 0.3s;
        }
        .city-card:hover .city-icon { transform: scale(1.1); }
        .city-name {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
        }
        .city-province {
            font-size: 13px;
            color: var(--jade);
            margin-bottom: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .city-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; position: relative; z-index: 1; }
        .tag {
            padding: 5px 12px;
            background: linear-gradient(135deg, var(--paper) 0%, var(--paper-dark) 100%);
            border-radius: 15px;
            font-size: 12px;
            color: var(--ink-light);
            border: 1px solid var(--paper-dark);
            transition: all 0.3s;
        }
        .city-card:hover .tag { background: var(--gold-light); border-color: var(--gold); color: var(--ink); }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(44, 44, 44, 0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: var(--ivory);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 30px;
            animation: slideUp 0.4s ease;
            position: relative;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
        }
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cinnabar), var(--gold), var(--cinnabar));
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }
        .modal-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 22px;
            letter-spacing: 3px;
            color: var(--ink);
        }
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--paper);
            border: 1px solid var(--paper-dark);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--ink-light);
        }
        .modal-close:hover {
            background: var(--cinnabar);
            color: white;
            border-color: var(--cinnabar);
        }
        .detail-section { margin-bottom: 24px; }
        .detail-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--ink);
            letter-spacing: 1px;
        }
        .detail-content { color: var(--ink-light); line-height: 1.9; font-size: 14px; }
        .detail-list { list-style: none; }
        .detail-list li {
            padding: 16px 0;
            border-bottom: 1px dashed var(--paper-dark);
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .detail-list li:hover { color: var(--cinnabar); padding-left: 8px; }
        .detail-list li:last-child { border-bottom: none; }
        .detail-list li::before { content: '◆'; color: var(--gold); font-size: 10px; }
        .post-card {
            background: var(--ivory);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 6px 20px var(--shadow);
            border: 1px solid rgba(212, 168, 75, 0.15);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px var(--shadow-lg);
        }
        .post-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--paper) 0%, var(--paper-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px solid var(--gold);
            box-shadow: 0 3px 10px var(--shadow);
            transition: all 0.3s;
        }
        .avatar:hover { transform: scale(1.1); border-color: var(--cinnabar); }
        .avatar-sm { width: 38px; height: 38px; font-size: 20px; border-width: 1px; }
        .user-info { flex: 1; }
        .user-name { font-weight: 700; font-size: 16px; color: var(--ink); letter-spacing: 1px; }
        .user-bio { font-size: 12px; color: var(--jade); margin-top: 3px; }
        .post-content {
            color: var(--ink);
            line-height: 1.9;
            margin-bottom: 16px;
            font-size: 14px;
            padding: 16px;
            background: linear-gradient(135deg, var(--paper) 0%, var(--ivory) 100%);
            border-radius: 10px;
            border-left: 4px solid var(--gold);
            position: relative;
        }
        .post-content::before {
            content: '"';
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 32px;
            color: var(--gold);
            opacity: 0.3;
            font-family: 'ZCOOL XiaoWei', serif;
            line-height: 1;
        }
        .post-actions { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid var(--paper-dark); }
        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            background: linear-gradient(135deg, var(--paper) 0%, var(--ivory) 100%);
            border: 1px solid var(--paper-dark);
            border-radius: 22px;
            color: var(--ink-light);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
        }
        .action-btn:hover { 
            background: linear-gradient(135deg, var(--cinnabar) 0%, #A63030 100%); 
            color: white; 
            border-color: var(--cinnabar);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(199, 62, 58, 0.3);
        }
        .action-btn.liked { 
            color: var(--cinnabar); 
            border-color: var(--cinnabar);
            background: rgba(199, 62, 58, 0.1);
        }
        .profile-header {
            text-align: center;
            padding: 50px 20px 40px;
            background: linear-gradient(180deg, var(--ink) 0%, var(--jade-dark) 100%);
            margin: -16px -16px 24px -16px;
            border-radius: 0 0 40px 40px;
            position: relative;
            overflow: hidden;
        }
        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a84b' fill-opacity='0.05'%3E%3Cpath d='M40 40l20-20v40l-20-20z'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(253, 248, 240, 0.2) 0%, rgba(253, 248, 240, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin: 0 auto 18px;
            border: 3px solid var(--gold);
            box-shadow: 0 6px 25px rgba(0,0,0,0.4), 0 0 30px rgba(212, 168, 75, 0.3);
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: all 0.4s;
        }
        .profile-avatar:hover { 
            transform: scale(1.1) rotate(5deg); 
            box-shadow: 0 10px 35px rgba(0,0,0,0.5), 0 0 40px rgba(212, 168, 75, 0.5);
        }
        .profile-name {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 28px;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 5px;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .profile-level {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--gold) 0%, #B8923E 100%);
            color: var(--ink);
            border-radius: 25px;
            font-size: 13px;
            font-weight: 700;
            position: relative;
            z-index: 1;
            box-shadow: 0 3px 10px rgba(212, 168, 75, 0.3);
        }
        .profile-content {
            padding: 0 20px 20px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
        .stat-card {
            background: linear-gradient(135deg, var(--ivory) 0%, var(--paper) 100%);
            padding: 20px 14px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 5px 15px var(--shadow);
            border: 1px solid rgba(212, 168, 75, 0.2);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px var(--shadow-lg);
            border-color: var(--gold);
        }
        .stat-value { font-family: 'ZCOOL XiaoWei', serif; font-size: 28px; font-weight: 700; color: var(--cinnabar); }
        .stat-label { font-size: 12px; color: var(--ink-light); margin-top: 5px; letter-spacing: 1px; }
        .bottom-nav {
            display: none;
        }
        .main-layout {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }
        .main-content {
            flex: 1;
            min-width: 0;
        }
        .sidebar {
            width: 280px;
            flex-shrink: 0;
        }
        .sidebar-card {
            background: var(--ivory);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 6px 20px var(--shadow);
            border: 1px solid rgba(212, 168, 75, 0.2);
            margin-bottom: 24px;
        }
        .sidebar-title {
            font-family: 'ZCOOL XiaoWei', serif;

            { id: 8, name: '武汉', province_name: '湖北', highlights: '江城,樱花之都', attractions: '黄鹤楼,东湖,户部巷', food: '热干面,鸭脖,豆皮', hotels: '马哥孛罗/锦江国际', bestSeason: '春', avgStayDays: 2, hotelDay: 220, mealDay: 100, route: 'Day1:黄鹤楼→户部巷\nDay2:东湖' },
            { id: 9, name: '太原', province_name: '山西', highlights: '龙城,晋商文化', attractions: '晋祠,山西博物院', food: '刀削面,过油肉', hotels: '并州饭店/潞安戴斯', bestSeason: '春秋', avgStayDays: 2, hotelDay: 170, mealDay: 85, route: 'Day1:晋祠→山西博物院' },
            { id: 10, name: '大同', province_name: '山西', highlights: '云冈石窟,悬空寺', attractions: '云冈石窟,悬空寺,恒山', food: '刀削面,浑源凉粉', hotels: '云冈建国/魏都国际', bestSeason: '夏秋', avgStayDays: 2, hotelDay: 160, mealDay: 80, route: 'Day1:云冈石窟\nDay2:悬空寺→恒山' },

            { id: 12, name: '恩施', province_name: '湖北', highlights: '仙居恩施,大峡谷', attractions: '恩施大峡谷,屏山峡谷,腾龙洞', food: '土家油茶,小土豆', hotels: '瑞享国际/轩宇大酒店', bestSeason: '春秋', avgStayDays: 3, hotelDay: 180, mealDay: 85, route: 'Day1:恩施大峡谷\nDay2:腾龙洞' }
        ];
        async function api(url, options = {}) {
            try {
                const res = await fetch(`${API_BASE}${url}`, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {}), ...options.headers }
                });
                if (!res.ok) { if (res.status === 401) { logout(); showToast('请先登录'); return null; } throw new Error('请求失败'); }
                return await res.json();
            } catch (err) { console.error('API Error:', err); showToast('网络请求失败'); return null; }
        }
        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        function showPage(page) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            const pageToNav = { home: 0, explore: 1, social: 2, profile: 3 };
            if (pageToNav[page] !== undefined) {
                const navLinks = document.querySelectorAll('.nav-link');
                if (navLinks[pageToNav[page]]) navLinks[pageToNav[page]].classList.add('active');
            }
            if (!authToken && page === 'profile') { showAuth(); return; }
            const pages = { home: loadHomePage, explore: loadExplorePage, social: loadSocialPage, profile: loadProfilePage, search: loadSearchPage };
            if (pages[page]) pages[page]();
        }
        function init() {
            if (authToken) {
                api('/auth/me').then(user => { if (user) { currentUser = user; loadHomePage(); } else { logout(); } });
            } else { loadHomePage(); }
        }
        function showAuth(tab = 'login') {
            document.getElementById('content').innerHTML = `
                <div class="auth-container">
                    <div class="auth-logo"><span class="auth-logo-icon">🏔️</span><span class="auth-logo-text">山河旅图</span></div>
                    <div class="auth-tabs">
                        <div class="auth-tab ${tab === 'login' ? 'active' : ''}" onclick="switchAuthTab('login')">登录</div>
                        <div class="auth-tab ${tab === 'register' ? 'active' : ''}" onclick="switchAuthTab('register')">注册</div>
                    </div>
                    <div id="authForm"></div>
                </div>`;
            switchAuthTab(tab);
        }
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            const form = document.getElementById('authForm');
            if (tab === 'login') {
                form.innerHTML = `<div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名"></div><div class="form-group"><label class="form-label">密码</label><input type="password" class="form-input" id="loginPassword" placeholder="请输入密码"></div><button class="btn" onclick="handleLogin()">登 录</button>`;
            } else {
                form.innerHTML = `<div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="regUsername" placeholder="设置用户名"></div><div class="form-group"><label class="form-label">密码</label><input type="password" class="form-input" id="regPassword" placeholder="设置密码"></div><div class="form-group"><label class="form-label">昵称</label><input type="text" class="form-input" id="regNickname" placeholder="设置昵称"></div><button class="btn" onclick="handleRegister()">注 册</button>`;
            }
        }
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();

            const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            if (res && res.success) { authToken = res.token; currentUser = res.user; localStorage.setItem('token', authToken); showToast('登录成功'); init(); }
            else if (res && res.error) { showToast(res.error); }
        }
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();

            const res = await api('/posts?limit=3');

            document.getElementById('latestPosts').style.display = 'block';
        }
        function getCityIcon(cityName) { const icons = { '西安': '🏯', '宝鸡': '⛰️', '兰州': '🌉', '敦煌': '🏜️', '银川': '🏜️', '洛阳': '🏛️', '成都': '🐼', '武汉': '🏯', '太原': '⛩️', '大同': '🏔️', '平遥': '🏮', '恩施': '🌿' }; return icons[cityName] || '🏙️'; }
        function formatTime(dateStr) { if (!dateStr) return ''; const date = new Date(dateStr); const now = new Date(); const diff = now - date; if (diff < 60000) return '刚刚'; if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前'; if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前'; if (diff < 604800000) return Math.floor(diff / 86400000) + '天前'; return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }); }
        function loadExplorePage(provinceFilter = null) {
            const filteredCities = provinceFilter ? cities.filter(c => c.province_name === provinceFilter) : cities;
            document.getElementById('content').innerHTML = `<div class="page active"><div class="section-title">🗺️ 城市探索</div><div class="province-tabs"><button class="province-tab ${!provinceFilter ? 'active' : ''}" onclick="loadExplorePage(null)">全部</button><button class="province-tab ${provinceFilter === '陕西' ? 'active' : ''}" onclick="loadExplorePage('陕西')">陕西</button><button class="province-tab ${provinceFilter === '甘肃' ? 'active' : ''}" onclick="loadExplorePage('甘肃')">甘肃</button><button class="province-tab ${provinceFilter === '宁夏' ? 'active' : ''}" onclick="loadExplorePage('宁夏')">宁夏</button><button class="province-tab ${provinceFilter === '山西' ? 'active' : ''}" onclick="loadExplorePage('山西')">山西</button><button class="province-tab ${provinceFilter === '河南' ? 'active' : ''}" onclick="loadExplorePage('河南')">河南</button><button class="province-tab ${provinceFilter === '湖北' ? 'active' : ''}" onclick="loadExplorePage('湖北')">湖北</button><button class="province-tab ${provinceFilter === '四川' ? 'active' : ''}" onclick="loadExplorePage('四川')">四川</button></div><div class="cities-grid" style="margin-top:20px;">${filteredCities.map(c => `<div class="city-card" onclick="showCityDetail(${c.id})"><span class="city-icon">${getCityIcon(c.name)}</span><div class="city-name">${c.name}</div><div class="city-province">${c.province_name}</div><div class="city-tags">${c.highlights.split(',').slice(0, 2).map(h => `<span class="tag">${h}</span>`).join('')}</div></div>`).join('')}</div></div>`;
        }
        function showCityDetail(cityId) {
            const city = cities.find(c => c.id === cityId);
            if (!city) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay show';
            modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">${getCityIcon(city.name)} ${city.name}</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div><div class="detail-section"><div class="detail-title">✨ 城市亮点</div><div style="display:flex;flex-wrap:wrap;gap:8px;">${city.highlights.split(',').map(h => `<span class="tag">${h}</span>`).join('')}</div></div><div class="detail-section"><div class="detail-title">📍 必游景点</div><ul class="detail-list">${city.attractions.split(',').map(a => `<li>${a}</li>`).join('')}</ul></div><div class="detail-section"><div class="detail-title">🍜 特色美食</div><ul class="detail-list">${city.food.split('、').map(f => `<li>${f}</li>`).join('')}</ul></div><div class="detail-section"><div class="detail-title">🗺️ 推荐路线</div><div class="detail-content" style="background:var(--paper);padding:16px;border-radius:8px;white-space:pre-line;">${city.route}</div></div><div class="detail-section"><div class="detail-title">💰 预算参考（${city.avgStayDays}日）</div><ul class="detail-list"><li>🏨 住宿：¥${city.hotelDay * city.avgStayDays}</li><li>🍜 餐饮：¥${city.mealDay * city.avgStayDays * 3}</li><li>📊 建议游玩：${city.avgStayDays}天</li><li>🌤️ 最佳季节：${city.bestSeason}</li></ul></div><button class="btn btn-secondary" onclick="createTravelPlan('${city.name}')" style="margin-top:16px;">📋 创建旅行计划</button></div>`;
            document.body.appendChild(modal);
        }
        function createTravelPlan(cityName) {
            document.querySelector('.modal-overlay.show')?.remove();
            const city = cities.find(c => c.name === cityName);
            if (!city) return;
            const plans = JSON.parse(localStorage.getItem('travelPlans') || '[]');
            const plan = { 
                id: Date.now(), 
                city: city.name, 
                days: city.avgStayDays, 
                cityData: city, 
                createdAt: new Date().toLocaleString('zh-CN'),
                notes: '',
                status: 'planning'
            };
            plans.unshift(plan);
            localStorage.setItem('travelPlans', JSON.stringify(plans.slice(0, 20)));
            showToast('旅行计划已创建！');
            showPage('profile');
        }
        function showPlanDetail(planId) {
            const plans = JSON.parse(localStorage.getItem('travelPlans') || '[]');
            const plan = plans.find(p => p.id === planId);
            if (!plan) return;
            const city = plan.cityData;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay show';
            modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">📋 ${plan.city}旅行计划</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div><div class="detail-section"><div class="detail-title">🗓️ 行程概览</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"><div style="background:var(--paper);padding:14px;border-radius:10px;text-align:center;"><div style="font-size:24px;font-weight:700;color:var(--cinnabar);">${plan.days}</div><div style="font-size:12px;color:var(--ink-light);">行程天数</div></div><div style="background:var(--paper);padding:14px;border-radius:10px;text-align:center;"><div style="font-size:24px;font-weight:700;color:var(--jade);">¥${(city.hotelDay * city.avgStayDays + city.mealDay * city.avgStayDays * 3).toFixed(0)}</div><div style="font-size:12px;color:var(--ink-light);">预算参考</div></div></div></div><div class="detail-section"><div class="detail-title">📍 必游景点</div><ul class="detail-list">${city.attractions.split(',').map(a => `<li>${a}</li>`).join('')}</ul></div><div class="detail-section"><div class="detail-title">🍜 特色美食</div><ul class="detail-list">${city.food.split('、').map(f => `<li>${f}</li>`).join('')}</ul></div><div class="detail-section"><div class="detail-title">🗺️ 推荐路线</div><div class="detail-content" style="background:var(--paper);padding:16px;border-radius:10px;white-space:pre-line;border-left:4px solid var(--gold);">${city.route}</div></div><div class="detail-section"><div class="detail-title">📝 旅行笔记</div><textarea class="form-input" id="planNotes" placeholder="添加你的旅行笔记..." style="resize:none;min-height:80px;margin-bottom:12px;">${plan.notes || ''}</textarea><button class="btn btn-secondary" onclick="savePlanNotes(${planId})">保存笔记</button></div><div style="display:flex;gap:10px;margin-top:16px;"><button class="btn" onclick="deletePlan(${planId})" style="background:linear-gradient(135deg,#666,#444);flex:1;">删除计划</button><button class="btn btn-secondary" onclick="completePlan(${planId})" style="flex:1;">${plan.status === 'completed' ? '已完成 ✓' : '标记完成'}</button></div></div>`;
            document.body.appendChild(modal);
        }
        function savePlanNotes(planId) {
            const plans = JSON.parse(localStorage.getItem('travelPlans') || '[]');
            const planIndex = plans.findIndex(p => p.id === planId);
            if (planIndex === -1) return;
            const notes = document.getElementById('planNotes').value.trim();
            plans[planIndex].notes = notes;
            localStorage.setItem('travelPlans', JSON.stringify(plans));
            showToast('笔记已保存');
        }
        function deletePlan(planId) {
            if (!confirm('确定要删除这个旅行计划吗？')) return;
            const plans = JSON.parse(localStorage.getItem('travelPlans') || '[]');
            const filteredPlans = plans.filter(p => p.id !== planId);
            localStorage.setItem('travelPlans', JSON.stringify(filteredPlans));
            document.querySelector('.modal-overlay.show')?.remove();
            showToast('计划已删除');
            showPage('profile');
        }
        function completePlan(planId) {
            const plans = JSON.parse(localStorage.getItem('travelPlans') || '[]');
            const planIndex = plans.findIndex(p => p.id === planId);
            if (planIndex === -1) return;
            plans[planIndex].status = plans[planIndex].status === 'completed' ? 'planning' : 'completed';
            localStorage.setItem('travelPlans', JSON.stringify(plans));
            showToast(plans[planIndex].status === 'completed' ? '已标记为完成！' : '已取消完成状态');
            showPage('profile');
        }
        async function loadSocialPage() {
            document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
            const res = await api('/posts');
            const posts = res || [];
            document.getElementById('content').innerHTML = `<div class="page active"><div class="section-title">📜 旅行动态</div><div class="post-input-card" onclick="showCreatePost()"><div class="avatar">${currentUser?.avatar || '🧳'}</div><div class="post-input-placeholder">分享你的旅途故事...</div></div>${posts.length > 0 ? posts.map(p => `<div class="post-card" data-post-id="${p.id}"><div class="post-header"><div class="avatar">${p.avatar || '🧳'}</div><div class="user-info"><div class="user-name">${p.nickname || '匿名旅人'}</div><div class="user-bio">${formatTime(p.created_at)}</div></div></div><div class="post-content">${p.content}</div><div class="post-actions"><button class="action-btn" onclick="toggleLike('${p.id}', this)">🤍 ${p.likes_count || 0}</button><button class="action-btn" onclick="showComments('${p.id}')">💬 ${p.comments_count || 0}</button><button class="action-btn" onclick="sharePost('${p.nickname}')">🔗 分享</button></div></div>`).join('') : `<div class="empty-state"><span class="empty-icon">📜</span><div class="empty-text">暂无动态，快来发布第一条吧！</div></div>`}</div>`;
        }
        function showCreatePost() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay show';
            modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">📝 发布动态</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div><textarea class="form-input" id="postContent" rows="6" placeholder="分享你的旅行故事..." style="resize:none;margin-bottom:16px;min-height:120px;"></textarea><button class="btn" onclick="createPost()">发 布</button></div>`;
            document.body.appendChild(modal);
        }
        async function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) { showToast('请输入内容'); return; }
            const res = await api('/posts', { method: 'POST', body: JSON.stringify({ content }) });
            if (res && res.success) { document.querySelector('.modal-overlay.show')?.remove(); showToast('发布成功'); loadSocialPage(); }
        }
        async function toggleLike(postId, btn) {
            const res = await api('/likes', { method: 'POST', body: JSON.stringify({ post_id: postId }) });
            if (res && res.success) { const currentCount = parseInt(btn.textContent.replace(/[^0-9]/g, '')); if (res.liked) { btn.textContent = `❤️ ${currentCount + 1}`; btn.classList.add('liked'); } else { btn.textContent = `🤍 ${currentCount - 1}`; btn.classList.remove('liked'); } }
        }
        async function showComments(postId) {
            const res = await api(`/posts/${postId}/comments`);
            const comments = res || [];
            const modal = document.createElement('div');
            modal.className = 'modal-overlay show';
            modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">💬 评论 (${comments.length})</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div><div id="commentsList" style="max-height:400px;overflow-y:auto;margin-bottom:16px;">${comments.length > 0 ? comments.map(c => `<div style="padding:14px;border-bottom:1px dashed var(--paper-dark);"><div style="display:flex;gap:10px;margin-bottom:8px;"><div class="avatar avatar-sm">${c.avatar || '🧳'}</div><div><div class="user-name" style="font-size:14px;">${c.nickname}</div><div class="user-bio">${formatTime(c.created_at)}</div></div></div><div style="color:var(--ink-light);padding-left:46px;font-size:14px;line-height:1.7;">${c.content}</div></div>`).join('') : '<div class="empty-state" style="padding:40px;"><span class="empty-icon">💬</span><div class="empty-text">暂无评论</div></div>'}</div><div style="display:flex;gap:10px;"><input type="text" class="form-input" id="commentInput" placeholder="发表评论..." style="flex:1;"><button class="btn" style="width:auto;padding:12px 24px;" onclick="addComment('${postId}')">发送</button></div></div>`;
            document.body.appendChild(modal);
        }
        async function addComment(postId) {
            const content = document.getElementById('commentInput').value.trim();
            if (!content) { showToast('请输入评论内容'); return; }
            const res = await api(`/posts/${postId}/comments`, { method: 'POST', body: JSON.stringify({ content }) });
            if (res && res.success) { document.getElementById('commentInput').value = ''; showToast('评论成功'); showComments(postId); }
        }
        function sharePost(nickname) { const text = `${nickname}的旅行分享 - 山河旅图`; if (navigator.share) { navigator.share({ title: '山河旅图', text }); } else { navigator.clipboard.writeText(text); showToast('已复制到剪贴板'); } }
        function loadProfilePage() {
            if (!currentUser) { showAuth('login'); return; }
            document.getElementById('content').innerHTML = `<div class="page active"><div class="profile-header"><div class="profile-avatar" onclick="showAvatarPicker()">${currentUser.avatar || '🧳'}</div><div class="profile-name">${currentUser.nickname || '旅人'}</div><div class="profile-level">Lv.${currentUser.level || 1}</div></div><div class="profile-content"><div class="section-title" style="margin-top:20px;">✏️ 个人信息</div><div class="card" style="margin-bottom:16px;"><div class="info-item"><span class="info-label">昵称</span><input type="text" id="profileNickname" value="${currentUser.nickname || ''}" class="info-input" placeholder="设置昵称"></div><div class="info-item"><span class="info-label">签名</span><input type="text" id="profileBio" value="${currentUser.bio || ''}" class="info-input" placeholder="添加签名..."></div></div><button class="btn btn-secondary" onclick="saveProfile()" style="margin-bottom:16px;">保存修改</button><div class="stats-grid"><div class="stat-card"><div class="stat-value">${currentUser.experience || 0}</div><div class="stat-label">经验值</div></div><div class="stat-card"><div class="stat-value">${currentUser.posts_count || 0}</div><div class="stat-label">发布动态</div></div><div class="stat-card"><div class="stat-value">${currentUser.followers_count || 0}</div><div class="stat-label">粉丝</div></div></div><div class="section-title">📋 我的旅行计划</div><div id="myPlans">${loadMyPlans()}</div><button class="btn" onclick="logout()" style="margin-top:30px;background:linear-gradient(135deg, #666 0%, #444 100%);">退 出 登 录</button></div></div>`;
        }
        function loadMyPlans() { 
            const plans = JSON.parse(localStorage.getItem('travelPlans') || '[]'); 
            if (plans.length === 0) { 
                return `<div class="empty-state" style="padding:40px;"><span class="empty-icon">📋</span><div class="empty-text">暂无旅行计划</div></div>`; 
            } 
            return plans.map(p => `<div class="plan-card" onclick="showPlanDetail(${p.id})"><div class="plan-card-title"><span>${p.status === 'completed' ? '✅' : '📋'}</span> ${p.city}</div><div class="plan-card-meta">${p.days}日行程 · ${p.createdAt}</div></div>`).join(''); 
        }
        function showAvatarPicker() { const avatars = ['🧳', '👨‍✈️', '👩‍✈️', '🧑‍🚀', '👨‍🌾', '👩‍🌾', '🧔', '👩‍🦰', '👨‍🦳', '👩‍🦳', '👨‍💼', '👩‍💼', '🎒', '🏃', '🚶', '🧗', '🏕️', '🎣', '📸', '🗺️']; const modal = document.createElement('div'); modal.className = 'modal-overlay show'; modal.innerHTML = `<div class="modal-content"><div class="modal-header"><div class="modal-title">选择头像</div><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:10px;">${avatars.map(a => `<div class="avatar" style="cursor:pointer;font-size:32px;margin:0;" onclick="selectAvatar('${a}')">${a}</div>`).join('')}</div></div>`; document.body.appendChild(modal); }
        async function selectAvatar(avatar) { document.querySelector('.modal-overlay.show')?.remove(); const res = await api('/user/profile', { method: 'PUT', body: JSON.stringify({ avatar }) }); if (res && res.success) { currentUser.avatar = avatar; showToast('头像已更新'); loadProfilePage(); } }
        async function saveProfile() { const nickname = document.getElementById('profileNickname').value.trim(); const bio = document.getElementById('profileBio').value.trim(); const res = await api('/user/profile', { method: 'PUT', body: JSON.stringify({ nickname, bio }) }); if (res && res.success) { currentUser.nickname = nickname; currentUser.bio = bio; showToast('保存成功'); } }
        function loadSearchPage() { document.getElementById('content').innerHTML = `<div class="page active"><div class="section-title">🔍 搜索</div><div class="card" style="margin-bottom:20px;"><input type="text" class="form-input" id="searchInput" placeholder="搜索城市、攻略..." oninput="handleSearch(this.value)" style="font-size:16px;"></div><div id="searchResults"></div></div>`; document.getElementById('searchInput').focus(); }
        function handleSearch(query) { if (!query || query.length < 1) { document.getElementById('searchResults').innerHTML = ''; return; } const results = cities.filter(c => c.name.includes(query) || c.province_name.includes(query) || c.highlights.includes(query)); document.getElementById('searchResults').innerHTML = results.length > 0 ? `<div class="cities-grid">${results.map(c => `<div class="city-card" onclick="showCityDetail(${c.id})"><span class="city-icon">${getCityIcon(c.name)}</span><div class="city-name">${c.name}</div><div class="city-province">${c.province_name}</div></div>`).join('')}</div>` : '<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-text">未找到相关城市</div></div>'; }
        init();
    </script>
</body>
</html>
